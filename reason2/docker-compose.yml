# Reason2 + Router + Live-VLM-WebUI
services:
  router:
    image: router
    container_name: router
    ports: ["8080:8080"]
    networks: [vlm-net]
    restart: unless-stopped

  reason2:
    image: reason2
    container_name: reason2
    runtime: nvidia
    volumes:
      - ../models/reason2:/model:ro
    networks: [vlm-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  vlm-net:
    driver: bridge
