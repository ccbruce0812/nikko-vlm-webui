# YOLOv8n TensorRT + Router + Live-VLM-WebUI
services:
  router:
    image: router
    container_name: router
    ports: ["8080:8080"]
    networks: [vlm-net]
    restart: unless-stopped

  yolo:
    image: yolo
    container_name: yolo
    runtime: nvidia
    volumes:
      - ../models/yolo:/model:ro
    networks: [vlm-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  vlm-net:
    driver: bridge
